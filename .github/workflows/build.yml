name: CI & Desktop Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write  # tag 构建要创建 Release 并上传 exe

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # 中文字体也要装：没有 CJK 字体时汉字全被量成同一个窄框，
      # 依赖字形宽度的排版测试就测不出东西了
      - name: Install system libs for Qt offscreen
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libglib2.0-0 fonts-noto-cjk
      - name: Install deps (pynput without evdev on Linux)
        run: |
          pip install PySide6 httpx rapidocr-onnxruntime pytest
          pip install --no-deps pynput
          pip install six
      - name: Run tests
        run: QT_QPA_PLATFORM=offscreen python -m pytest tests/ -q

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt pyinstaller
      - name: Build folder app (for installer)
        run: pyinstaller --noconfirm ivyea-translate.spec
      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          if (!(Test-Path dist/IvyeaTranslate-Setup.exe)) { throw "installer not produced" }
      - name: Smoke check artifacts
        shell: pwsh
        run: |
          foreach ($f in @("dist/IvyeaTranslate-Setup.exe")) {
            if (!(Test-Path $f)) { throw "$f not produced" }
            $len = (Get-Item $f).Length
            Write-Host "$f size: $([math]::Round($len/1MB)) MB"
            if ($len -lt 80MB) { throw "$f suspiciously small ($len bytes) - dependencies likely missing" }
          }
      - name: Smoke install + run installed app
        shell: pwsh
        run: |
          Start-Process -FilePath dist\IvyeaTranslate-Setup.exe -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART" -Wait
          $installdir = "$env:LOCALAPPDATA\Programs\IvyeaTranslate"
          $exe = "$installdir\IvyeaTranslate.exe"
          if (!(Test-Path $exe)) { throw "installed exe not found at $exe" }
          # is_installed_copy() 依赖安装目录里的卸载器来判定"安装版"，缺了就会误判为非安装版
          if (!(Test-Path "$installdir\unins000.exe")) { throw "uninstaller missing -> update self-detect would fail" }
          $env:QT_QPA_PLATFORM = "offscreen"
          $env:IVYEA_TRANSLATE_HOME = "$env:RUNNER_TEMP\ivyea-smoke2"
          $p = Start-Process -FilePath $exe -PassThru
          Start-Sleep -Seconds 20
          if ($p.HasExited) { throw "installed exe exited early, code=$($p.ExitCode)" }
          Stop-Process -Id $p.Id -Force
          Write-Host "installed app smoke OK"
      - uses: actions/upload-artifact@v4
        with:
          name: IvyeaTranslate-win64
          path: dist/IvyeaTranslate-Setup.exe
      - name: Attach to release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/IvyeaTranslate-Setup.exe

  # macOS 版目前是未签名 Beta：CI 只能保证"能构建、能启动"，
  # 热键/取词/截图/权限弹窗必须在真机人工验证（见 README 的 macOS 清单）
  build-macos:
    needs: test
    runs-on: macos-14  # Apple Silicon(arm64)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt pyinstaller
      - name: Make .icns app icon
        run: |
          set -euo pipefail
          iconset=build/icon.iconset
          mkdir -p "$iconset"
          for sz in 16 32 64 128 256 512; do
            sips -z $sz $sz assets/icon.png --out "$iconset/icon_${sz}x${sz}.png" >/dev/null
            sips -z $((sz*2)) $((sz*2)) assets/icon.png --out "$iconset/icon_${sz}x${sz}@2x.png" >/dev/null
          done
          iconutil -c icns "$iconset" -o assets/icon.icns
      - name: Build .app
        run: pyinstaller --noconfirm ivyea-translate-mac.spec
      - name: Package dmg (drag to Applications)
        run: |
          set -euo pipefail
          test -d dist/IvyeaTranslate.app || { echo ".app not produced"; exit 1; }
          staging=$(mktemp -d)
          cp -R dist/IvyeaTranslate.app "$staging/"
          ln -s /Applications "$staging/Applications"
          hdiutil create -volname "Ivyea Translate" -srcfolder "$staging" \
            -ov -format UDZO dist/IvyeaTranslate-mac-arm64.dmg
      - name: Smoke check artifacts
        run: |
          set -euo pipefail
          dmg=dist/IvyeaTranslate-mac-arm64.dmg
          size=$(stat -f%z "$dmg")
          echo "dmg size: $((size/1024/1024)) MB"
          # 依赖漏打时会出几十 MB 的空壳且照样"构建成功"（Windows 侧踩过）
          if [ "$size" -lt 60000000 ]; then echo "dmg suspiciously small: $size"; exit 1; fi
      - name: Smoke run .app (offscreen, must stay alive 30s)
        run: |
          set -euo pipefail
          export QT_QPA_PLATFORM=offscreen
          export IVYEA_TRANSLATE_HOME="$RUNNER_TEMP/ivyea-smoke"
          dist/IvyeaTranslate.app/Contents/MacOS/IvyeaTranslate &
          pid=$!
          sleep 30
          if ! kill -0 $pid 2>/dev/null; then echo "app exited early"; wait $pid; exit 1; fi
          kill $pid
          echo "app stayed alive 30s - smoke OK"
      - uses: actions/upload-artifact@v4
        with:
          name: IvyeaTranslate-mac-arm64
          path: dist/IvyeaTranslate-mac-arm64.dmg
      - name: Attach to release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/IvyeaTranslate-mac-arm64.dmg
