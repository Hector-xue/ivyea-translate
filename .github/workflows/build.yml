name: CI & Windows Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write  # tag 构建要创建 Release 并上传 exe

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system libs for Qt offscreen
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libglib2.0-0
      - name: Install deps (pynput without evdev on Linux)
        run: |
          pip install PySide6 httpx rapidocr-onnxruntime pytest
          pip install --no-deps pynput
          pip install six
      - name: Run tests
        run: QT_QPA_PLATFORM=offscreen python -m pytest tests/ -q

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt pyinstaller
      - name: Build portable exe
        run: pyinstaller --noconfirm ivyea-translate-portable.spec
      - name: Smoke check artifact
        shell: pwsh
        run: |
          if (!(Test-Path dist/IvyeaTranslate.exe)) { throw "exe not produced" }
          $len = (Get-Item dist/IvyeaTranslate.exe).Length
          Write-Host "exe size: $([math]::Round($len/1MB)) MB"
          if ($len -lt 80MB) { throw "exe suspiciously small ($len bytes) - dependencies likely missing" }
      - name: Smoke run exe (offscreen, must stay alive 30s)
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          $env:IVYEA_TRANSLATE_HOME = "$env:RUNNER_TEMP\ivyea-smoke"
          $p = Start-Process -FilePath dist\IvyeaTranslate.exe -PassThru
          Start-Sleep -Seconds 30
          if ($p.HasExited) { throw "exe exited early, code=$($p.ExitCode)" }
          Stop-Process -Id $p.Id -Force
          Write-Host "exe stayed alive 30s - smoke OK"
      - uses: actions/upload-artifact@v4
        with:
          name: IvyeaTranslate-portable-win64
          path: dist/IvyeaTranslate.exe
      - name: Attach to release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/IvyeaTranslate.exe
